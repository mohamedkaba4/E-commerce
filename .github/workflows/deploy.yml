name: Deploy App

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
        env: DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
      - run: npx prisma generate
      - run: npm run build
